name: Integrate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run lint
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}
    steps:
      - uses: holepunchto/actions/bare-base@v1

      - name: Install fixture dependencies
        shell: bash
        run: for dir in test/fixtures/*/; do (cd "$dir" && npm install --install-links); done

      - name: Install electron dependencies
        if: matrix.platform == 'linux'
        run: apt update && apt install -y libgtk-3-0 libnss3 libasound2t64 libxss1 libgbm1

      - name: Run tests
        run: ${{ matrix.platform == 'linux' && 'xvfb-run ' || '' }}npm test
