name: Test with Node
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test-node:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux

          - os: macos-latest
            platform: macos

          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}
    steps:
      - uses: holepunchto/actions/node-base@v1

      - name: Install fixture dependencies
        shell: bash
        run: for dir in test/fixtures/*/; do (cd "$dir" && npm install --install-links); done

      - name: Run tests
        run: ${{ matrix.platform == 'linux' && 'xvfb-run ' || '' }}npm run test:node

      - name: Run Windows MSIX e2e test
        if: matrix.platform == 'win32'
        run: npm run test:node:e2e

      - name: Run Windows Squirrel manager test
        if: matrix.platform == 'win32'
        run: npm run test:squirrel:node
